name: Trivy Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - 'trivy-badge.svg'
      - 'README.md'
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Scan & Badge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig,vuln
          severity: HIGH,CRITICAL
          format: json
          output: trivy-results.json
          exit-code: 0  # Don't fail on findings, just report

      - name: Generate Trivy Badge
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          # Load trivy results
          with open('trivy-results.json') as f:
              data = json.load(f)

          results = data.get('Results', [])

          # Count findings
          total_secrets = 0
          total_misconfig = 0
          total_vulns = 0
          secret_critical = 0
          misconfig_critical = 0

          for r in results:
              secrets = r.get('Secrets', [])
              total_secrets += len(secrets)
              for s in secrets:
                  if s.get('Severity', '').upper() == 'CRITICAL':
                      secret_critical += 1

              misconfigs = r.get('Misconfigurations', [])
              total_misconfig += len(misconfigs)
              for m in misconfigs:
                  if m.get('Severity', '').upper() == 'CRITICAL':
                      misconfig_critical += 1

              vulns = r.get('Vulnerabilities', [])
              total_vulns += len(vulns)

          total_findings = total_secrets + total_misconfig + total_vulns

          # Determine color and label
          if total_findings == 0:
              color = '#28a745'  # Green — clean
              label = 'CLEAN'
          elif total_findings <= 3:
              color = '#f0883e'  # Orange — some findings
              label = f'{total_findings} FINDINGS'
          else:
              color = '#cb2431'  # Red — attention needed
              label = f'{total_findings} FINDINGS'

          # Add critical indicator
          if secret_critical > 0 or misconfig_critical > 0:
              label += f' • {secret_critical + misconfig_critical} CRIT'
              color = '#cb2431'

          # Get scan date
          from datetime import datetime, timezone
          scan_date = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          # Generate SVG badge
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="380" height="28">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="380" height="28" rx="6" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <!-- Shield icon -->
  <circle cx="14" cy="14" r="5" fill="{color}" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Label: trivy -->
  <text x="26" y="14" fill="#8b949e" font-family="monospace" font-size="11" font-weight="600" dominant-baseline="middle">trivy</text>
  <!-- Separator -->
  <line x1="68" y1="6" x2="68" y2="22" stroke="#30363d" stroke-width="1"/>
  <!-- Result -->
  <text x="200" y="14" fill="{color}" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="middle">{label}</text>
  <!-- Pulse dot for "alive" feel -->
  <circle cx="360" cy="14" r="4" fill="{color}" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Timestamp -->
  <text x="380" y="14" fill="#484f58" font-family="monospace" font-size="8" text-anchor="end" dominant-baseline="middle">{scan_date}</text>
</svg>'''

          with open('trivy-badge.svg', 'w') as f:
              f.write(svg)

          print(f"Badge generated: {label} (secrets={total_secrets}, misconfigs={total_misconfig}, vulns={total_vulns})")
          PYEOF

      - name: Commit updated badge
        run: |
          if [[ -n $(git status -s trivy-badge.svg) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add trivy-badge.svg
            git commit -m "🔍 trivy: auto-update security badge [skip ci]"
            git push
            echo "✅ Badge committed"
          else
            echo "⏭️ No badge changes"
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30
