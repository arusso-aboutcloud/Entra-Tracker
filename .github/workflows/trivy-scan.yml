name: Trivy Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - 'trivy-badge.svg'
      - 'README.md'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Scan & Badge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig,vuln
          severity: HIGH,CRITICAL
          format: json
          output: trivy-results.json
          exit-code: 0

      - name: Generate Trivy Badge
        run: python3 scripts/generate_trivy_badge.py

      - name: Commit updated badge
        run: |
          if [[ -n $(git status -s trivy-badge.svg) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add trivy-badge.svg
            git commit -m "trivy: auto-update security badge [skip ci]"
            git push
            echo "Badge committed"
          else
            echo "No badge changes"
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30
